<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sohyp220-coder/WolfStyle@main/WolfStyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    body { background: #272727; margin: 0; padding: 0; }
    .btn { background: #D6D6D6; }
    .cards-wrapper {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding: 5px;
        gap: 10px;
    }
    .card-container {
        flex: 0 0 calc(50% - 15px); 
        box-sizing: border-box;
        text-align: center;
        color: #DECAB2;
        border: 1px solid #0081C2;
        border-radius: 10px;
        background: #333;
        padding: 10px 5px;
    }
    .card-img {
        width: 100%; 
        height: 80px;
        object-fit: cover;
        border-radius: 8px;
    }
    .card-p { font-size: 13px; margin: 8px 0; }
    </style>
</head>
<body>
    <header class="container" style="border: seagreen 2px dashed; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 10px;">
        <p class="btn btn-p">صيدلية المصري الجديدة الحديثة</p>
        <p class="btn btn-S" style="margin-top: 5px;">صحتك هي اولويتنا</p>
    </header>

    <div class="cards-wrapper">
        <div class="card-container">
            <img src="imgs/smart.jpg" class="card-img">
            <p class="card-p" value = "Smart Prescription">Smart Prescription</p>
            <input type="file" id="upload-p" capture="environment" accept="image/*" style="display: none;">
            <label for="upload-p" class="btn btn-l" style="display: block; width: 90%; margin: 0 auto; cursor: pointer; font-size: 10px; padding: 5px 0;" value="Send Prescription">
                Send Prescription
            </label>
        </div>

        <div class="card-container">
            <img src="imgs/care.jpg" class="card-img">
            <p class="card-p" value = "Beauty & Skincare">Beauty & Skincare</p>
            <button class="btn btn-S" onclick="sendOrder(this)" style="margin-top: 5px;">Order Now</button>
        </div>

        <div class="card-container">
            <img src="imgs/vitamin.jpg" class="card-img">
            <p class="card-p" value = "Vitamins & Offers">Vitamins & Offers</p>
            <button class="btn btn-S" onclick="sendOrder(this)" style="margin-top: 5px;">Order Now</button>
        </div>

        <div class="card-container">
            <img src="imgs/medical.jpg" class="card-img">
            <p class="card-p" value = "Medical Tools">Medical Tools</p>
            <button class="btn btn-S" onclick="sendOrder(this)" style="margin-top: 5px;">Order Now</button>
        </div>
    </div>

    <footer class="container" style="border: burlywood 2px dashed; display: flex; justify-content: center; align-items: center; color: beige; background: saddlebrown; margin: 10px; gap: 10px;">
        <a href="https://wa.me/201556101000">
            <i class="fa-brands fa-whatsapp" style="color: #25D366; font-size: 24px;"></i>
        </a>
        <p style="margin: 0;">Contact Via WhatsApp</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
