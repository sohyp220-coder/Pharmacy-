<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sohyp220-coder/WolfStyle@main/WolfStyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            background: #0f172a; 
            margin: 0; 
            padding: 0; 
            font-family: sans-serif;
        }

        header {
            background: #1e293b;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-bottom: 4px solid #10b981;
            text-align: center;
            margin-bottom: 20px;
        }

        .cards-wrapper {
            display: flex;
            flex-wrap: wrap;
            padding: 10px;
            gap: 10px;
            justify-content: center;
            width: 100%;
            box-sizing: border-box;
        }

        .card-cont {
            background: #1e293b;
            flex: 0 0 calc(50% - 15px);
            width: calc(50% - 15px);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 15px;
            box-sizing: border-box;
        }
        
        .card-img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-bottom: 2px solid #10b981;
        }

        .card-p {
            font-size: 13px;
            font-weight: bold;
            color: #f1f5f9;
            margin: 12px 0;
            text-align: center;
        }

        .btn-order {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 11px;
            width: 85%;
            cursor: pointer;
            font-weight: bold;
        }

        footer {
            background: #1e293b;
            margin-top: 30px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            border-top: 2px solid #334155;
        }
    </style>
</head>
<body>

    <header>
        <div class="btn btn-p" style="display:inline-block; background: #10b981; color: white;">صيدلية المصري الجديدة الحديثة</div>
        <div style="color: #94a3b8; font-size: 13px; margin-top: 8px;">صحتك هي أولويتنا</div>
    </header>

    <div class="cards-wrapper">
        <div class="card-cont">
            <img src="smart.jpg" class="card-img">
            <p class="card-p">Smart Prescription</p>
            <input type="file" id="upload-p" capture="environment" accept="image/*" style="display: none;">
            <label for="upload-p" class="btn btn-order" style="display: block; text-align: center; cursor: pointer;">Send Prescription</label>
        </div>

        <div class="card-cont card">
            <img src="care.jpg" class="card-img">
            <p class="card-p">Beauty & Skincare</p>
        </div>

        <div class="card-cont card">
            <img src="vitamin.jpg" class="card-img">
            <p class="card-p">Vitamins & Offers</p>
        </div>

        <div class="card-cont card">
            <img src="medical.jpg" class="card-img">
            <p class="card-p">Medical Tools</p>
        </div>
    </div>

    <footer>
        <a href="https://wa.me/201556101000">
            <i class="fa-brands fa-whatsapp" style="color: #22c55e; font-size: 32px;"></i>
        </a>
        <p style="margin: 0; color: #f1f5f9; font-weight: bold;">تواصل معنا مباشر</p>
    </footer>
    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <script src="db.js"></script>
</body>
</html>
